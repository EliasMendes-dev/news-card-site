<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impus - Portal de Noticias</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/globals.css">

    <!-- JavaScript -->
    <script defer type="module" src="./src/components/form.js"></script>
    <script defer type="module" src="./src/features/news-form.js"></script>
    <script defer type="module" src="./src/components/header.js"></script>
    <script defer type="module" src="./src/components/card.js"></script>
    <script defer type="module" src="./src/components/footer.js"></script>


</head>

<body>
    <div class="news-site">
        <site-header></site-header>

        <section class="site-intro" aria-labelledby="intro-title">
            <div class="content-wrapper">
                <p class="intro-welcome">Bem-vindo ao Impus</p>
                <h1 class="intro-slogan" id="intro-title">Suas notícias em um <span class="intro-highlight">só
                        lugar</span></h1>
                <p class="intro-description">Cadastre, organize e visualize notícias de forma elegante e moderna. Uma
                    plataforma simples e poderosa para gerenciar seu conteudo.</p>
            </div>
            <hr class="section-divider">
        </section>

        <main class="site-main" id="main-content">
            <section class="news-section" aria-labelledby="latest-news-title">
                <header class="main-header">
                    <div class="main-title">
                        <h2 class="main-title-text" id="latest-news-title">Ultimas Noticias</h2>
                        <p class="news-count">3 artigos</p>
                    </div>
                </header>

                <ul class="news-grid" role="list">

                    <li class="news-grid-item">
                        <card-news photo="assets/art.jpg" title="Arte urbana transforma centro historico"
                            author="Lara Monteiro" date="2026-05-14"
                            content="Murais colaborativos ocupam predios antigos e atraem visitantes para uma nova rota cultural no centro da cidade.">
                        </card-news>
                    </li>

                    <li class="news-grid-item">
                        <card-news photo="assets/journal.jpg" title="Jornalismo de dados ganha espaco nas redacoes"
                            author="Caio Menezes" date="2026-05-11"
                            content="Equipes de reportagem ampliam o uso de bases publicas para investigar mobilidade, saude e seguranca com mais precisao.">
                        </card-news>
                    </li>

                    <li class="news-grid-item">
                        <card-news photo="assets/street.jpg" title="Nova obra viaria reduz tempo no deslocamento"
                            author="Marina Alves" date="2026-05-08"
                            content="Motoristas e ciclistas relatam melhoria no fluxo apos a entrega da nova ligacao entre bairros estrategicos.">
                        </card-news>
                    </li>

                </ul>
            </section>
        </main>

        <hr class="section-divider">

        <site-footer></site-footer>
        <news-form></news-form>
    </div>



</body>

</html>
